<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BURMA'S FINEST GAME SHOP - ADMIN</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            color: #f8fafc;
            padding: 20px 15px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
        }

        .header h1 {
            font-size: 1.2rem;
            color: #38bdf8;
            text-transform: uppercase;
        }

        .tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .tab-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #94a3b8;
            padding: 10px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            white-space: nowrap;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: #0284c7;
            color: white;
            border-color: #38bdf8;
        }

        .panel {
            display: none;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .panel.active {
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 6px;
        }

        .form-input, select {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 10px;
            color: white;
            font-size: 0.9rem;
            outline: none;
        }

        .btn {
            background: #0284c7;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 0.95rem;
        }

        .btn:hover {
            background: #38bdf8;
        }

        .item-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 15px;
            margin-bottom: 12px;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .badge-pending { background: #b45309; color: #fef3c7; }
        .badge-success { background: #065f46; color: #d1fae5; }
        .badge-failed { background: #991b1b; color: #fee2e2; }

        .action-box {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .btn-sm {
            flex: 1;
            padding: 8px;
            font-size: 0.8rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>BURMA'S FINEST MENU CONTROL</h1>
        <div style="font-size: 0.8rem; color: #64748b;">ADMIN PANEL</div>
    </div>

    <div class="tab-container">
        <button class="tab-btn active" onclick="switchTab('orders-tab')">📥 အော်ဒါအသစ်များ</button>
        <button class="tab-btn" onclick="switchTab('products-tab')">💎 ဂိမ်းဈေးနှုန်းများ</button>
        <button class="tab-btn" onclick="switchTab('payment-tab')">💳 ငွေလွှဲအကောင့်</button>
    </div>

    <!-- ORDERS PANEL -->
    <div id="orders-tab" class="panel active">
        <h3 style="margin-bottom: 15px; color: #38bdf8;">📥 လက်ခံရရှိထားသော အော်ဒါများ</h3>
        <div id="adminOrderContainer">
            <p style="color: #64748b; text-align: center;">အော်ဒါများ ဆွဲယူနေပါသည်...</p>
        </div>
    </div>

    <!-- PRODUCTS PANEL -->
    <div id="products-tab" class="panel">
        <h3 style="margin-bottom: 15px; color: #38bdf8;">➕ ပက်ကေ့ချ်အသစ် ထည့်ရန်</h3>
        <div class="form-group">
            <label>ဂိမ်းရွေးချယ်ရန်</label>
            <select id="prodGame">
                <option value="mlbb">MLBB Diamonds</option>
                <option value="pubg">PUBG UC</option>
                <option value="freefire">Free Fire Diamonds</option>
                <option value="other">Other Services</option>
            </select>
        </div>
        <div class="form-group">
            <label>Package Name (ပမာဏ)</label>
            <input type="text" id="prodName" class="form-input" placeholder="ဥပမာ - 86 Diamonds">
        </div>
        <div class="form-group">
            <label>ဈေးနှုန်း (ကျပ်ငွေသီးသန့် ဂဏန်းရိုက်ရန်)</label>
            <input type="number" id="prodPrice" class="form-input" placeholder="ဥပမာ - 5500">
        </div>
        <div class="form-group">
            <label>ဂိမ်း Banner ပုံ Link (Optional)</label>
            <input type="text" id="prodImage" class="form-input" placeholder="https://example.com/banner.jpg">
        </div>
        <button class="btn" onclick="addNewProduct()">သိမ်းဆည်းမည် ➔</button>

        <h3 style="margin-top: 25px; margin-bottom: 15px; color: #38bdf8;">📋 လက်ရှိဈေးနှုန်းများ</h3>
        <div id="adminProductContainer"></div>
    </div>

    <!-- PAYMENT PANEL -->
    <div id="payment-tab" class="panel">
        <h3 style="margin-bottom: 15px; color: #38bdf8;">💳 ငွေလွှဲအကောင့်များ ပြင်ဆင်ရန်</h3>
        <div style="border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; margin-bottom: 15px;">
            <h4>KBZPay</h4>
            <div class="form-group" style="margin-top:10px;">
                <label>ဖုန်းနံပါတ်</label>
                <input type="text" id="kpayNum" class="form-input">
            </div>
            <div class="form-group">
                <label>အကောင့်အမည်</label>
                <input type="text" id="kpayName" class="form-input">
            </div>
            <button class="btn" onclick="updatePayment('kpay')">KPay ပြင်ဆင်မည်</button>
        </div>

        <div>
            <h4>WavePay</h4>
            <div class="form-group" style="margin-top:10px;">
                <label>ဖုန်းနံပါတ်</label>
                <input type="text" id="waveNum" class="form-input">
            </div>
            <div class="form-group">
                <label>အကောင့်အမည်</label>
                <input type="text" id="waveName" class="form-input">
            </div>
            <button class="btn" onclick="updatePayment('wave')">WavePay ပြင်ဆင်မည်</button>
        </div>
    </div>

    <!-- FIREBASE AND SCRIPT CONTROLS -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, addDoc, deleteDoc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDE13cBzGmbPz7N_Gpom3gsoDqK0Vak6ho",
            authDomain: "burma-s-finest.firebaseapp.com",
            projectId: "burma-s-finest",
            storageBucket: "burma-s-finest.firebasestorage.app",
            messagingSenderId: "583278696300",
            appId: "1:583278696300:web:bf3d863ba21377a674c549",
            measurementId: "G-1GQH273BHL"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Tab Switching Logic
        window.switchTab = function(tabId) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // 1. Real-time Orders Listener
        const ordersQuery = query(collection(db, "orders"), orderBy("timestamp", "desc"));
        onSnapshot(ordersQuery, (snapshot) => {
            const container = document.getElementById("adminOrderContainer");
            container.innerHTML = "";
            let count = 0;

            snapshot.forEach((docSnap) => {
                const order = docSnap.data();
                const id = docSnap.id;
                count++;

                let statusBadge = `<span class="badge badge-pending">စောင့်ဆိုင်းဆဲ</span>`;
                if(order.status === "completed" || order.status === "success") statusBadge = `<span class="badge badge-success">အောင်မြင်</span>`;
                if(order.status === "cancelled" || order.status === "failed") statusBadge = `<span class="badge badge-failed">ပယ်ဖျက်</span>`;

                const html = `
                    <div class="item-card">
                        <div class="item-header">
                            <strong style="color:#38bdf8;">${order.gameName}</strong>
                            ${statusBadge}
                        </div>
                        <div style="font-size:0.85rem; color:#cbd5e1; line-height:1.5;">
                            <strong>Player ID:</strong> ${order.playerId}<br>
                            ${order.serverId ? `<strong>Server ID:</strong> ${order.serverId}<br>` : ''}
                            <strong>Package:</strong> ${order.packageName}
                        </div>
                        <div class="action-box">
                            <button class="btn-sm" style="background:#059669; color:white;" onclick="updateOrderStatus('${id}', 'completed')">Done</button>
                            <button class="btn-sm" style="background:#dc2626; color:white;" onclick="updateOrderStatus('${id}', 'cancelled')">Cancel</button>
                            <button class="btn-sm" style="background:#4b5563; color:white;" onclick="deleteOrder('${id}')">Delete</button>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });

            if(count === 0) container.innerHTML = `<p style="color: #64748b; text-align: center;">လက်ရှိတွင် အော်ဒါအသစ်မရှိသေးပါဗျာ။</p>`;
        });

        window.updateOrderStatus = async function(id, status) {
            try {
                await updateDoc(doc(db, "orders", id), { status: status });
            } catch(e) { alert("Error updating status: " + e.message); }
        }

        window.deleteOrder = async function(id) {
            if(confirm("ဤအော်ဒါကို ဖျက်ပစ်ရန် သေချာပါသလား?")) {
                await deleteDoc(doc(db, "orders", id));
            }
        }

        // 2. Real-time Products Listener
        onSnapshot(collection(db, "products"), (snapshot) => {
            const container = document.getElementById("adminProductContainer");
            container.innerHTML = "";

            snapshot.forEach((docSnap) => {
                const prod = docSnap.data();
                const id = docSnap.id;

                const html = `
                    <div class="item-card" style="display:flex; justify-content:between; align-items:center;">
                        <div style="flex:1;">
                            <span style="font-size:0.75rem; color:#64748b; text-transform:uppercase;">[${prod.game}]</span>
                            <h4 style="margin:2px 0;">💎 ${prod.packageName}</h4>
                            <p style="color:#38bdf8; font-size:0.85rem;">${Number(prod.price).toLocaleString()} ကျပ်</p>
                        </div>
                        <button class="btn-sm" style="background:#dc2626; color:white; max-width:70px;" onclick="deleteProduct('${id}')">ဖျက်မည်</button>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
        });

        window.addNewProduct = async function() {
            const game = document.getElementById("prodGame").value;
            const packageName = document.getElementById("prodName").value.trim();
            const price = document.getElementById("prodPrice").value.trim();
            const imageUrl = document.getElementById("prodImage").value.trim();

            if(!packageName || !price) { alert("အချက်အလက် အကုန်ဖြည့်ပါဗျာ"); return; }

            await addDoc(collection(db, "products"), {
                game: game,
                packageName: packageName,
                price: Number(price),
                imageUrl: imageUrl || ""
            });

            document.getElementById("prodName").value = "";
            document.getElementById("prodPrice").value = "";
            document.getElementById("prodImage").value = "";
            alert("ပက်ကေ့ချ် အသစ်ထည့်သွင်းပြီးပါပြီ။");
        }

        window.deleteProduct = async function(id) {
            if(confirm("ဤဈေးနှုန်းကို ဖျက်ရန် သေချာပါသလား?")) {
                await deleteDoc(doc(db, "products", id));
            }
        }

        // 3. Payment Listener & Update
        onSnapshot(collection(db, "payment_settings"), (snapshot) => {
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                if(docSnap.id === "kpay") {
                    document.getElementById("kpayNum").value = data.accountNumber || "";
                    document.getElementById("kpayName").value = data.accountName || "";
                }
                if(docSnap.id === "wave") {
                    document.getElementById("waveNum").value = data.accountNumber || "";
                    document.getElementById("waveName").value = data.accountName || "";
                }
            });
        });

        window.updatePayment = async function(type) {
            const num = document.getElementById(`${type}Num`).value.trim();
            const name = document.getElementById(`${type}Name`).value.trim();

            await setDoc(doc(db, "payment_settings", type), {
                accountNumber: num,
                accountName: name
            });
            alert("ငွေလွှဲအကောင့် ပြင်ဆင်ပြီးပါပြီ။");
        }
    </script>
</body>
</html>
